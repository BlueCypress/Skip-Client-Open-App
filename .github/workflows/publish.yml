name: Release & publish to npm

# MANUAL release (NOT automatic on merge) — trigger from the Actions tab: "Release & publish" ->
# "Run workflow". It versions the app in LOCKSTEP (every workspace package and mj-app.json all move
# to one version), then tags and publishes every package:
#   - bump = auto (default): MINOR if migrations/, metadata/, or mj-app.json changed since the last
#     release tag, else PATCH.
#   - bump = patch | minor | major: use that level explicitly (major is only ever manual).
#
# The next version is ANCHORED TO NPM, not to the files: scripts/plan-release.mjs takes the highest
# version already published across the packages as the base, bumps that, and REFUSES TO RELEASE if
# the files don't match (they must be at the base for a fresh release, or at the bumped version when
# resuming a release whose publish step failed). So a wrong version left in the files can never cause
# a jumped or skipped release — the run fails instead.
#
# The release commit is tagged and pushed back to main (marked [skip ci]). Publishing uses npm
# trusted publishing (OIDC, no token); provenance is attached because the repo is public. Packages
# are published in dependency order (declared "workspaces" order) so a dependency publishes before
# any dependent. The package list is derived from the workspace, so new packages are included
# automatically — no workflow edits needed. Commit/tag/publish are all idempotent, so re-running
# after a partial failure safely completes the same version.
#
# Prereq: the workflow pushes a commit + tag to main, so the GitHub Actions token must be allowed
# to push to main (if main is a protected branch, allow the actions bot to bypass, or swap in a
# PAT / GitHub App token). It fails BEFORE publishing if the push is rejected, so npm never drifts
# ahead of git.

on:
  # Manual only — releases are NOT triggered on merge. Run from the Actions tab.
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump level — auto = minor if migrations/metadata/mj-app.json changed since last release, else patch'
        type: choice
        options: [auto, patch, minor, major]
        default: auto

concurrency:
  group: release-askskip
  cancel-in-progress: false

jobs:
  release:
    name: Release & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the version bump + push the release tag to main
      id-token: write # npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff the merged changes

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # >= 22.14.0 required by trusted publishing
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest # trusted publishing requires npm >= 11.5.1

      - name: Install workspace
        run: npm ci

      # Guard the files are internally consistent (every package + manifest at one version, internal
      # deps pinned exact) BEFORE we read the version to plan the release.
      - name: Verify lockstep (files self-consistent)
        run: npm run check:lockstep

      # Use the chosen bump, or (default "auto") detect it from what changed since the last
      # release tag: MINOR if migrations/, metadata/, or mj-app.json changed, else PATCH.
      - name: Determine bump level
        id: bump
        run: |
          LEVEL="${{ github.event.inputs.bump }}"
          if [ "$LEVEL" = "auto" ]; then
            LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -1 || true)"
            if [ -n "$LAST_TAG" ]; then
              CHANGED="$(git diff --name-only "$LAST_TAG" HEAD)"
              echo "Changes since $LAST_TAG:"; echo "$CHANGED"
              if echo "$CHANGED" | grep -qE '^(migrations/|metadata/|mj-app\.json$)'; then
                LEVEL="minor"
              else
                LEVEL="patch"
              fi
            else
              echo "No prior v* release tag — defaulting to patch."
              LEVEL="patch"
            fi
            echo "Auto-detected -> $LEVEL (migrations/metadata/manifest = minor, code = patch)"
          else
            echo "Explicit bump -> $LEVEL"
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      # Anchor the next version to what's PUBLISHED on npm and fail if the files disagree. This is
      # what stops a wrong version in the files from jumping/skipping a release. Emits next/base/mode.
      - name: Plan release (version anchored to npm; fails on mismatch)
        id: ver
        run: node scripts/plan-release.mjs "${{ steps.bump.outputs.level }}" >> "$GITHUB_OUTPUT"

      - name: Apply lockstep version bump
        run: |
          npm run version:lockstep "${{ steps.ver.outputs.next }}"
          npm run check:lockstep
          npm install --package-lock-only # keep the lockfile in sync with the new workspace versions

      # SKIP_DEFAULT_BASE_URL (repo Settings -> Variables) is baked into @askskip/core as the
      # default Skip endpoint at build time — kept out of the source tree, present in the
      # published artifact. Fail fast if unset so a release never ships without a default.
      - name: Build workspace (dependency order)
        env:
          SKIP_DEFAULT_BASE_URL: ${{ vars.SKIP_DEFAULT_BASE_URL }}
        run: |
          if [ -z "$SKIP_DEFAULT_BASE_URL" ]; then
            echo "::error::SKIP_DEFAULT_BASE_URL repository variable is not set — cannot bake the default Skip endpoint."
            exit 1
          fi
          npm run build

      # Commit + tag + push BEFORE publishing: if the push is rejected (e.g. branch protection),
      # the run fails here and npm is never published, so git and npm never drift. All steps are
      # idempotent: on a resume run (mode=resume) the files are already at the target version, so
      # there's nothing to commit and the tag already exists — we skip those and just publish.
      - name: Commit, tag, and push the release
        run: |
          set -euo pipefail
          NEXT="${{ steps.ver.outputs.next }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json mj-app.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit (mode=${{ steps.ver.outputs.mode }})."
          else
            git commit -m "chore(release): v$NEXT (${{ steps.bump.outputs.level }}) [skip ci]"
            git push origin HEAD:main
          fi
          if git rev-parse -q --verify "refs/tags/v$NEXT" >/dev/null; then
            echo "Tag v$NEXT already exists — reusing it."
          else
            git tag "v$NEXT"
          fi
          git push origin "v$NEXT"

      # No NODE_AUTH_TOKEN: the npm CLI authenticates as the configured trusted publisher via OIDC.
      # publishConfig.access=public publishes publicly; --provenance attaches a build attestation.
      # Publishes every workspace package in dependency (declared "workspaces") order, so a
      # dependency publishes before any dependent. Each package is skipped if that exact version
      # is already on npm (safe on re-run), and new packages are picked up automatically.
      - name: Publish packages (dependency order; skip versions already on npm)
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r name dir version; do
            [ -n "$name" ] || continue
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "::notice::$name@$version already on npm — skipping."
            else
              echo "Publishing $name@$version from $dir"
              ( cd "$dir" && npm publish --provenance )
            fi
          done < <(node scripts/list-packages.mjs)
